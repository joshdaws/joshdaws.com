<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Josh Daws</title>
<meta name="description" content="Josh Daws — Christ and culture. Writer, speaker, builder.">
<meta property="og:title" content="Josh Daws">
<meta property="og:description" content="Christ and culture. Writer, speaker, builder.">

<meta property="og:url" content="https://joshdaws.com">

<style>
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg-deep: #0d0d0d;
  --bg-surface: #1a1a1a;
  --bg-card: #222222;
  --bg-card-hover: #2a2a2a;
  --text-primary: #f0ece4;
  --text-secondary: #a8a49c;
  --gold: #c8a86e;
  --gold-dim: rgba(200, 168, 110, 0.15);
  --gold-glow: rgba(200, 168, 110, 0.08);
  --stripe-color: rgba(200, 168, 110, 0.03);
}

html {
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background-color: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  overflow-x: hidden;
}

/* Diagonal stripe texture */
body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(
    -45deg,
    transparent,
    transparent 40px,
    var(--stripe-color) 40px,
    var(--stripe-color) 41px
  );
  pointer-events: none;
  z-index: 0;
}

/* Subtle top gradient wash */
body::after {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 40vh;
  background: radial-gradient(ellipse at 50% 0%, var(--gold-glow) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 640px;
  padding: 3.5rem 1.5rem 4rem;
}

/* ——— Header ——— */
.header {
  text-align: center;
  margin-bottom: 3rem;
}

.name {
  font-family: 'Montserrat', sans-serif;
  font-size: 3.5rem;
  font-weight: 800;
  letter-spacing: -0.02em;
  line-height: 1.1;
  color: #ffffff;
}

.tagline {
  font-family: 'Open Sans', sans-serif;
  margin-top: 0.75rem;
  font-size: 0.85rem;
  font-weight: 400;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--text-secondary);
}

.divider {
  width: 48px;
  height: 2px;
  background: var(--gold);
  margin: 1.5rem auto 0;
  border-radius: 1px;
}

/* ——— Link Grid ——— */
.links-section {
  display: flex;
  flex-direction: column;
  gap: 2rem;
}

.section-label {
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-secondary);
  padding-left: 0.25rem;
  margin-bottom: -0.75rem;
}

.link-grid {
  display: grid;
  gap: 0.75rem;
}

.link-grid--primary {
  grid-template-columns: 1fr 1fr;
}

.link-grid--secondary {
  grid-template-columns: 1fr 1fr;
}

.link-card {
  display: flex;
  flex-direction: column;
  gap: 0.375rem;
  padding: 1.25rem 1rem;
  background: var(--bg-card);
  border: 1px solid rgba(255, 255, 255, 0.04);
  border-radius: 12px;
  text-decoration: none;
  color: var(--text-primary);
  transition: all 0.2s ease;
  position: relative;
  overflow: hidden;
}

.link-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, var(--gold-dim) 0%, transparent 60%);
  opacity: 0;
  transition: opacity 0.2s ease;
}

.link-card:hover {
  background: var(--bg-card-hover);
  border-color: rgba(200, 168, 110, 0.15);
  transform: translateY(-2px);
}

.link-card:hover::before {
  opacity: 1;
}

.link-card:active {
  transform: translateY(0);
}

.card-icon {
  position: relative;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--gold);
}

.card-icon svg {
  width: 24px;
  height: 24px;
}

.card-title {
  position: relative;
  font-size: 0.9rem;
  font-weight: 600;
  line-height: 1.3;
}

.card-subtitle {
  position: relative;
  font-size: 0.7rem;
  color: var(--text-secondary);
  font-weight: 400;
  line-height: 1.3;
}

/* Primary cards are a bit taller */
.link-grid--primary .link-card {
  padding: 1.5rem 1.125rem;
}

/* Secondary cards are compact */
.link-grid--secondary .link-card {
  padding: 1rem;
  gap: 0.25rem;
}

.link-grid--secondary .card-icon {
  width: 28px;
  height: 28px;
}

.link-grid--secondary .card-icon svg {
  width: 20px;
  height: 20px;
}

.link-grid--secondary .card-title {
  font-size: 0.8rem;
}

.link-grid--secondary .card-subtitle {
  font-size: 0.65rem;
}

/* Arrow indicator */
.card-arrow {
  position: absolute;
  top: 1rem;
  right: 1rem;
  color: var(--text-secondary);
  opacity: 0;
  transform: translate(-4px, 0);
  transition: all 0.2s ease;
}

.card-arrow svg {
  width: 14px;
  height: 14px;
}

.link-card:hover .card-arrow {
  opacity: 0.6;
  transform: translate(0, 0);
}

/* ——— Footer ——— */
.footer {
  text-align: center;
  margin-top: 3.5rem;
  padding-top: 2rem;
  border-top: 1px solid rgba(255, 255, 255, 0.05);
}

.footer-text {
  font-size: 0.7rem;
  color: var(--text-secondary);
  font-weight: 400;
  letter-spacing: 0.05em;
}

/* ——— Responsive ——— */
@media (max-width: 480px) {
  .container {
    padding: 2.5rem 1.25rem 3rem;
  }

  .name {
    font-size: 2.5rem;
  }

  .link-grid--primary,
  .link-grid--secondary {
    grid-template-columns: 1fr;
  }

  .link-grid--primary .link-card,
  .link-grid--secondary .link-card {
    flex-direction: row;
    align-items: center;
    gap: 0.75rem;
    padding: 1rem 1.125rem;
  }

  .link-grid--primary .card-icon,
  .link-grid--secondary .card-icon {
    flex-shrink: 0;
  }

  .card-text {
    display: flex;
    flex-direction: column;
    gap: 0.125rem;
  }

  .card-arrow {
    top: 50%;
    transform: translate(-4px, -50%);
  }

  .link-card:hover .card-arrow {
    transform: translate(0, -50%);
  }
}

@media (min-width: 481px) and (max-width: 640px) {
  .name {
    font-size: 2.75rem;
  }
}
</style>
